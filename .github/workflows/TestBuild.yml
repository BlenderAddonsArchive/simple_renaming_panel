name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Read version from blender_manifest.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('blender_manifest.toml','rb'); print(tomllib.load(f)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create addon folder structure
        run: |
          mkdir -p simple_renaming
          cp -r . simple_renaming/
          # Remove excluded folders
          rm -rf simple_renaming/.git
          rm -rf simple_renaming/.*
          rm -rf simple_renaming/tests
          rm -rf simple_renaming/venv

      - name: Zip addon
        run: |
          zip -r simple_renaming_${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}.zip \
            simple_renaming

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_renaming_${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}
          path: simple_renaming_${{ steps.version.outputs.version }}_${{ steps.vars.outputs.short_sha }}.zip
          retention-days: 7