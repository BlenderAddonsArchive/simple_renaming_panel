name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: ${{ github.event.repository.name }}

      - name: Read version from blender_manifest.toml
        id: version
        run: |
          manifest_version=$(grep '^version' ${{ github.event.repository.name }}/blender_manifest.toml | sed 's/version = "\(.*\)"/\1/')
          echo "manifest_version=$VERSION"

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Zip addon
        run: |
          version_with_underscores=$(echo ${{ github.ref_name }} | tr '.' '_')
          zip -r simple_renaming_${version_with_underscores}_${{ steps.vars.outputs.short_sha }}.zip \
            ${{ github.event.repository.name }} \
            -x "${{ github.event.repository.name }}/.git*" \
            -x "${{ github.event.repository.name }}/.*/*" \
            -x "${{ github.event.repository.name }}/tests/*" \
            -x "${{ github.event.repository.name }}/venv/*"


      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_renaming_${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}
          path: simple_renaming_${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}.zip
          retention-days: 7